project:
  name: Project Atlas
  version: 1.3.0+1
  status: active
  platform: flutter-desktop-windows

database:
  engine: sqlite
  schema_version: 10
  path: "%APPDATA%/<YourCompany>/project_atlas/project_atlas.sqlite"

integrations:
  ollama:
    enabled: true
    host: http://localhost:11434
    model: qwen3.5:9b
    timeout_seconds: 300
  telegram:
    enabled: false
    bot_token: ""
    chat_id: ""

library:
  supported_extensions:
    - txt
    - md
    - json
    - csv
    - log
    - xml
    - yaml
    - yml
    - html
    - htm
    - eml
    - docx
    - pdf
  max_import_bytes: 10485760
