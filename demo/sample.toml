[application]
name = "Project Atlas"
version = "1.3.0+1"
platform = "flutter-desktop-windows"

[database]
engine = "sqlite"
schema_version = 10
path = "%APPDATA%/<YourCompany>/project_atlas/project_atlas.sqlite"

[ollama]
enabled = true
host = "http://localhost:11434"
model = "qwen3.5:9b"
timeout_seconds = 300
summary_sections = [
  "Goal",
  "Current State",
  "Ownership",
  "Relevant Docs",
  "Blockers",
  "Next Actions",
  "Confidence",
]

[telegram]
enabled = false
outbound_only = true
parse_mode = "HTML"

[library]
max_import_mb = 10
documents_folder = "atlas_documents"
