name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ''
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Install MCP gateway Python dependencies
        run: python -m pip install "PyJWT[crypto]" PyYAML

      - name: Generate Drift code
        run: dart run build_runner build --delete-conflicting-outputs

      - name: Compile MCP gateway scripts
        run: python -m py_compile tools\atlas_mcp_gateway.py tools\atlas_mcp_remote_policy.py tools\smoke_mcp_gateway.py tools\repair_drift_timestamps.py tools\apply_owner_continuity.py tools\import_runtime_manifest.py tools\seed_portfolio_capture.py tools\test_atlas_mcp_remote_policy.py tools\test_timestamp_integrity.py

      - name: Test MCP remote disclosure policy
        run: python -m unittest discover -s tools -p "test_*.py" -v

      - name: Analyze
        run: flutter analyze

      - name: Test MCP adapter
        run: flutter test test\atlas_mcp_stdio_server_test.dart test\atlas_mcp_adapter_test.dart --concurrency=1

      - name: Test
        # The queue lease suite uses background Drift isolates and real
        # two-connection SQLite contention. Serial execution prevents hosted
        # Windows runners from exhausting those 30-second tests while still
        # exercising the full suite.
        run: flutter test --concurrency=1

      - name: Build Windows release
        run: flutter build windows --release

      - name: Seed MCP smoke fixture
        shell: pwsh
        run: |
          $exe = (Resolve-Path 'build\windows\x64\runner\Release\project_atlas.exe').Path
          $request = '{"jsonrpc":"2.0","id":"bootstrap","method":"tools/call","params":{"name":"list_projects","arguments":{"includeArchived":false}}}'
          $request | & $exe --mcp-stdio | Out-Null
          $db = Get-ChildItem -Path $env:APPDATA -Filter 'project_atlas.sqlite' -File -Recurse |
            Sort-Object LastWriteTimeUtc -Descending |
            Select-Object -First 1
          if ($null -eq $db) {
            throw 'Project Atlas did not create its application-support database.'
          }
          $env:ATLAS_MCP_SMOKE_DB = $db.FullName
          flutter test tools\seed_mcp_smoke_fixture_test.dart --concurrency=1

      - name: Smoke MCP gateway
        run: python tools\smoke_mcp_gateway.py --exe build\windows\x64\runner\Release\project_atlas.exe
